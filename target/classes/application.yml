spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_support}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  cache:
    type: simple

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    chat-path: ${OPENAI_CHAT_PATH:/v1/chat/completions}
    default-model: ${OPENAI_MODEL:gpt-4o-mini}
    timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:30}
  memory:
    recent-history-limit: ${MEMORY_RECENT_HISTORY_LIMIT:8}
    semantic-search-limit: ${MEMORY_SEMANTIC_SEARCH_LIMIT:4}
    max-keyword-count: ${MEMORY_MAX_KEYWORD_COUNT:8}
