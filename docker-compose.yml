services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-support-postgres
    environment:
      POSTGRES_DB: ai_support
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_support"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-customer-support-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ai_support
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_CHAT_PATH: ${OPENAI_CHAT_PATH:-/v1/chat/completions}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-30}
      MEMORY_RECENT_HISTORY_LIMIT: ${MEMORY_RECENT_HISTORY_LIMIT:-8}
      MEMORY_SEMANTIC_SEARCH_LIMIT: ${MEMORY_SEMANTIC_SEARCH_LIMIT:-4}
      MEMORY_MAX_KEYWORD_COUNT: ${MEMORY_MAX_KEYWORD_COUNT:-8}
      JAVA_OPTS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres-data:

